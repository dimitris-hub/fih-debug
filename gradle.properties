# Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# Project
mod_version=1.0.0
maven_group=com.example.addon
archives_base_name=fih-debug

# Minecraft / Fabric — confirmed for 1.21.11 (last release on old 1.x.y scheme,
# last release to require Java 21; see fabricmc.net/2025/12/05/12111.html)
minecraft_version=1.21.11
yarn_mappings=1.21.11+build.3
loader_version=0.18.1
fabric_version=0.141.4+1.21.11

# Meteor Client — UNVERIFIED for 1.21.11. The official MeteorDevelopment/meteor-client
# repo did not have 1.21.11 support as of Dec 2025 (see repo issue #5918). Only
# third-party forks (e.g. MeteorClientPlus/MeteorPlus) had 1.21.11 builds, and they
# publish from a DIFFERENT maven host: https://maven.meteordev.org/releases
# (not maven.meteordevelopment.dev, which is what's in build.gradle below).
# Before building: confirm which artifact/repo you actually want to depend on,
# then update both this version string and the repository URL in build.gradle.
meteor_version=1.21-SNAPSHOT
